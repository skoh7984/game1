<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리반 감정 팡팡! - 화면 출력 수정</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --vh: 1vh; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; user-select: none; touch-action: none; width: 100vw; height: calc(var(--vh, 1vh) * 100); }
        
        /* 설정 화면 */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .speed-container { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .speed-btn { padding: 10px 18px; font-size: 15px; border: 2px solid #eee; background: #f9f9f9; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .speed-btn.active { background: #ff4785; color: white; border-color: #ff4785; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; width: 100%; max-width: 320px; }
        .emoji-btn { font-size: 32px; border-radius: 12px; border: 3px solid #f0f0f0; background: white; aspect-ratio: 1/1; cursor: pointer; }
        
        /* UI 레이아웃 */
        #top-ui { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; gap: 10px; }
        .info-box { background: rgba(255, 255, 255, 0.85); padding: 8px 15px; border-radius: 15px; border: 2px solid #ff4785; font-weight: bold; }
        #bottom-ui { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; }
        #target-guide { background: #fff; padding: 8px 20px; border-radius: 30px; border: 3px solid #ff4785; font-weight: bold; }

        /* 핵심: 카메라 영상과 캔버스 배치 */
        #input_video { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            object-fit: cover; transform: rotateY(180deg); 
            z-index: 1; /* 영상이 배경으로 깔림 */
        }
        #gameCanvas { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            z-index: 5; /* 게임 요소가 영상 위에 그려짐 */
            pointer-events: none; 
        }

        #result-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2>감정 팡팡!</h2>
    <div class="speed-container">
        <button class="speed-btn active" onclick="setSpeed(10)">10</button>
        <button class="speed-btn" onclick="setSpeed(20)">20</button>
        <button class="speed-btn" onclick="setSpeed(30)">30</button>
        <button class="speed-btn" onclick="setSpeed(40)">40</button>
        <button class="speed-btn" onclick="setSpeed(50)">50</button>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="top-ui">
    <div class="info-box" style="color: #ff4785;">⏱ <span id="timer">40</span></div>
    <div class="info-box" style="color: #333;">✨ <span id="score">0</span></div>
</div>

<div id="bottom-ui">
    <div id="target-guide"><span id="target-emoji" style="font-size: 30px;"></span> 찾기!</div>
</div>

<div id="result-screen">
    <h1>종료!</h1>
    <p id="final-score" style="font-size: 24px; font-weight: bold;"></p>
    <button onclick="location.reload()" style="padding: 10px 20px; border-radius: 10px; background: #ff4785; color: white; border: none;">다시 시작</button>
</div>

<video id="input_video" autoplay muted playsinline></video>
<canvas id="gameCanvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const emotionList = ['😊', '😆', '🥳', '😢', '😡', '😲', '😒', '😱'];
    
    let score = 0, timeLeft = 40, gameStarted = false, targetEmoji = '', gameSpeed = 10;
    let emojis = [], particles = [], pinchPoints = [];

    window.setSpeed = (val) => {
        gameSpeed = val;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.innerText == val));
    };

    // 캔버스 크기 설정
    function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    emotionList.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn'; btn.innerText = emoji;
        btn.onclick = () => {
            targetEmoji = emoji;
            document.getElementById('target-emoji').innerText = emoji;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('top-ui').style.display = 'flex';
            document.getElementById('bottom-ui').style.display = 'flex';
            startGame();
        };
        document.getElementById('emoji-grid').appendChild(btn);
    });

    function startGame() {
        gameStarted = true;
        for(let i=0; i<4; i++) emojis.push(new RandomEmotion());
        const timerIdx = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerIdx);
                gameStarted = false;
                document.getElementById('final-score').innerText = `최종 점수: ${score}점`;
                document.getElementById('result-screen').style.display = 'flex';
            }
        }, 1000);
    }

    class RandomEmotion {
        constructor() { this.size = Math.min(window.innerWidth * 0.1, 45); this.init(); }
        init() {
            const margin = 60;
            this.baseX = Math.random() * (canvasElement.width - margin * 2) + margin;
            this.baseY = Math.random() * (canvasElement.height - margin * 3) + margin + 40;
            const pool = [...emotionList, targetEmoji, targetEmoji];
            this.text = pool[Math.floor(Math.random() * pool.length)];
            this.isPopping = false; this.popLife = 1.0; this.timer = 0;
            this.angle = Math.random() * Math.PI * 2;
            this.maxTime = (60 / (gameSpeed / 10)) * 2.2;
        }
        update() {
            if(!gameStarted) return;
            if(this.isPopping) {
                this.popLife -= 0.08;
                if(this.popLife <= 0) this.init();
                return;
            }
            this.timer++;
            if(this.timer > this.maxTime) this.init();
            
            this.angle += 0.04;
            this.x = this.baseX + Math.sin(this.angle) * 15;
            this.y = this.baseY + Math.cos(this.angle * 0.8) * 15;

            for(let p of pinchPoints) {
                if(Math.hypot(this.x - p.x, this.y - p.y) < this.size * 1.3) {
                    this.isPopping = true;
                    if(this.text === targetEmoji) { score += 10; document.getElementById('score').innerText = score; }
                    for(let i=0; i<6; i++) particles.push({x:this.x, y:this.y, sx:Math.random()*6-3, sy:Math.random()*6-3, life:1, c:this.text===targetEmoji});
                }
            }
        }
        draw() {
            canvasCtx.save();
            canvasCtx.globalAlpha = this.popLife;
            // 카메라 반전(rotateY)에 맞춘 좌표 계산
            canvasCtx.translate(canvasElement.width - this.x, this.y);
            canvasCtx.font = `${this.size}px serif`;
            canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle';
            canvasCtx.fillText(this.text, 0, 0);
            canvasCtx.restore();
        }
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    
    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        pinchPoints = [];
        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks) => {
                canvasCtx.strokeStyle = '#39FF14'; canvasCtx.lineWidth = 4;
                const joints = [[0,1,2,3,4], [0,5,6,7,8], [5,9,10,11,12], [9,13,14,15,16], [13,17,18,19,20], [0,17]];
                joints.forEach(j => {
                    canvasCtx.beginPath();
                    j.forEach((idx, i) => {
                        const x = (1 - landmarks[idx].x) * canvasElement.width;
                        const y = landmarks[idx].y * canvasElement.height;
                        if(i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                    });
                    canvasCtx.stroke();
                });
                const thumb = landmarks[4], index = landmarks[8];
                if (Math.hypot(thumb.x - index.x, thumb.y - index.y) < 0.06) {
                    pinchPoints.push({x: thumb.x * canvasElement.width, y: thumb.y * canvasElement.height});
                    canvasCtx.fillStyle = '#FFFF00'; canvasCtx.beginPath();
                    canvasCtx.arc((1-thumb.x)*canvasElement.width, thumb.y*canvasElement.height, 10, 0, Math.PI*2); canvasCtx.fill();
                }
            });
        }
        if(gameStarted) {
            emojis.forEach(e => { e.update(); e.draw(); });
            particles.forEach((p, i) => {
                p.x += p.sx; p.y += p
