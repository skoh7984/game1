<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>말랑말랑 정답 자석 퍼즐</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #FFF9E1; padding: 10px; margin: 0;
            overflow-y: auto; color: #5A4A42;
        }

        .controls { 
            margin-top: 10px; padding: 15px; background: #fff; 
            border-radius: 25px; box-shadow: 0 6px 0 #FFD966; 
            text-align: center; border: 3px solid #FFD966; width: 90%; max-width: 600px;
        }
        
        h2 { color: #FF6B6B; font-size: 20px; margin: 5px 0; }
        .btn-group { margin: 10px 0; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        
        .level-btn { 
            padding: 8px 12px; font-size: 13px; cursor: pointer; 
            border: 2px solid #A8E6CF; background: #fff; color: #4DB6AC; 
            border-radius: 50px; font-weight: bold;
        }
        .level-btn.active { background: #A8E6CF; color: #fff; }
        
        #startBtn { 
            padding: 10px 25px; font-size: 18px; background-color: #FF8B8B; 
            color: white; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; box-shadow: 0 4px 0 #E57373;
        }

        .container { 
            display: flex; flex-direction: column; gap: 20px; 
            align-items: center; margin-top: 20px; padding-bottom: 80px;
        }

        @media (min-width: 800px) {
            .container { flex-direction: row-reverse; justify-content: center; align-items: flex-start; gap: 40px; }
        }
        
        .puzzle-board, .piece-bin {
            display: grid; border: 8px solid #FFD1D1; 
            background-color: #ffffff; border-radius: 20px;
            padding: 5px;
        }

        .slot {
            border: 2px dashed #FFECF2; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }

        .piece {
            cursor: grab; border: 2px solid rgba(255,255,255,0.8);
            box-sizing: border-box; user-select: none;
            background-repeat: no-repeat; border-radius: 12px;
            touch-action: none; position: relative;
            z-index: 10;
        }

        .piece.dragging { 
            opacity: 0.85; transform: scale(1.1); 
            z-index: 9999 !important; pointer-events: none; 
        }

        /* 제자리로 돌아갈 때 부드러운 효과 */
        .piece.returning {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
        }

        /* 정답에 성공했을 때 반짝 효과 */
        @keyframes successPop {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .piece.is-correct { animation: successPop 0.4s ease-out; border: 3px solid #A8E6CF; }

        #preview { max-width: 80px; max-height: 80px; border: 3px solid #DCEDC8; display: none; margin: 5px auto; border-radius: 10px; }
        .label-text { font-weight: bold; color: #FF8B8B; background: #fff; padding: 5px 15px; border-radius: 20px; border: 3px solid #FFD1D1; font-size: 15px; margin-bottom: 10px; display: inline-block; }

        .game-column { text-align: center; }
        .confetti { position: fixed; width: 12px; height: 12px; z-index: 999; pointer-events: none; border-radius: 50%; }
    </style>
</head>
<body>

    <h2>🌈 착! 달라붙는 사진 퍼즐 🌈</h2>
    
    <div class="controls">
        <label for="imageInput" style="display: inline-block; padding: 8px 20px; background: #FFD966; color: #5A4A42; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px;">📷 사진 고르기</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">

        <div class="btn-group">
            <button class="level-btn" onclick="setLevel(2, this)">🐣 2x2</button>
            <button class="level-btn active" onclick="setLevel(3, this)">🐥 3x3</button>
            <button class="level-btn" onclick="setLevel(4, this)">🌳 4x4</button>
            <button class="level-btn" onclick="setLevel(5, this)">💎 5x5</button>
        </div>

        <button id="startBtn">시작! 🧩</button>
        <img id="preview" alt="미리보기">
    </div>

    <div class="container">
        <div class="game-column">
            <span class="label-text">🏠 완성하는 곳</span>
            <div id="board" class="puzzle-board"></div>
        </div>
        <div class="game-column">
            <span class="label-text">🎁 퍼즐 보관함</span>
            <div id="bin" class="piece-bin"></div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const startBtn = document.getElementById('startBtn');
        const preview = document.getElementById('preview');
        const board = document.getElementById('board');
        const bin = document.getElementById('bin');
        
        let selectedImageUrl = "";
        let currentSize = 3; 
        let imgW = 0, imgH = 0;
        let activePiece = null;
        let startX = 0, startY = 0;
        let lastParent = null; // 방금 드래그를 시작한 칸을 기억

        function setLevel(size, btn) {
            currentSize = size;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            board.innerHTML = ''; bin.innerHTML = '';
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageUrl = event.target.result;
                preview.src = selectedImageUrl;
                preview.style.display = 'block';
                const tempImg = new Image();
                tempImg.onload = function() { imgW = tempImg.width; imgH = tempImg.height; };
                tempImg.src = selectedImageUrl;
            };
            reader.readAsDataURL(file);
        });

        startBtn.addEventListener('click', function() {
            if (!selectedImageUrl) { alert("사진을 선택해 주세요! 😊"); return; }
            createPuzzle(selectedImageUrl, currentSize);
        });

        function createPuzzle(imgUrl, size) {
            board.innerHTML = ''; bin.innerHTML = '';
            const isWide = window.innerWidth >= 800;
            const maxBase = isWide ? Math.min(window.innerWidth / 2 - 100, 420) : Math.min(window.innerWidth - 40, 360);
            
            let displayW, displayH;
            if (imgW >= imgH) { displayW = maxBase; displayH = (imgH / imgW) * maxBase; }
            else { displayH = maxBase; displayW = (imgW / imgH) * maxBase; }

            const cellW = displayW / size;
            const cellH = displayH / size;
            
            [board, bin].forEach(el => {
                el.style.width = displayW + 'px'; el.style.height = displayH + 'px';
                el.style.gridTemplateColumns = `repeat(${size}, ${cellW}px)`;
                el.style.gridTemplateRows = `repeat(${size}, ${cellH}px)`;
            });

            for (let i = 0; i < size * size; i++) {
                const bSlot = document.createElement('div');
                bSlot.classList.add('slot');
                bSlot.dataset.correctIndex = i; // 이 슬롯에 들어와야 할 정답 번호
                board.appendChild(bSlot);

                const pSlot = document.createElement('div');
                pSlot.classList.add('slot');
                bin.appendChild(pSlot);

                const piece = document.createElement('div');
                piece.classList.add('piece');
                piece.dataset.index = i; // 조각의 고유 번호
                piece.style.width = cellW + 'px';
                piece.style.height = cellH + 'px';
                piece.style.backgroundImage = `url(${imgUrl})`;
                piece.style.backgroundSize = `${displayW}px ${displayH}px`;
                piece.style.backgroundPosition = `-${(i % size) * cellW}px -${Math.floor(i / size) * cellH}px`;
                
                piece.addEventListener('mousedown', startDrag);
                piece.addEventListener('touchstart', startDrag, {passive: false});

                bin.querySelectorAll('.slot')[i].appendChild(piece);
            }

            const allPieces = Array.from(bin.querySelectorAll('.piece'));
            allPieces.sort(() => Math.random() - 0.5);
            const binSlots = bin.querySelectorAll('.slot');
            allPieces.forEach((p, idx) => binSlots[idx].appendChild(p));
        }

        function startDrag(e) {
            if (e.touches && e.touches.length > 1) return;
            if (activePiece) return;
            
            activePiece = this;
            lastParent = activePiece.parentElement; // 원래 있던 칸 기억
            activePiece.classList.remove('returning', 'is-correct');
            activePiece.classList.add('dragging');
            
            const event = e.type.includes('touch') ? e.touches[0] : e;
            startX = event.clientX;
            startY = event.clientY;

            window.addEventListener('mousemove', moveDrag);
            window.addEventListener('touchmove', moveDrag, {passive: false});
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);
        }

        function moveDrag(e) {
            if (!activePiece) return;
            if (e.touches && e.touches.length > 1) { endDrag(e); return; }
            e.preventDefault();

            const event = e.type.includes('touch') ? e.touches[0] : e;
            const dx = event.clientX - startX;
            const dy = event.clientY - startY;

            activePiece.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
        }

        function endDrag(e) {
            if (!activePiece) return;
            const event = (e.type === 'touchend') ? e.changedTouches[0] : e;
            
            activePiece.classList.remove('dragging');
            
            // 모든 '완성하는 곳'의 슬롯들만 가져옴
            const boardSlots = Array.from(board.querySelectorAll('.slot'));
            let targetSlot = null;
            let minDistance = 70; // 자석처럼 끌어당기는 범위 (픽셀)

            boardSlots.forEach(slot => {
                const rect = slot.getBoundingClientRect();
                const slotCenterX = rect.left + rect.width / 2;
                const slotCenterY = rect.top + rect.height / 2;
                
                const dist = Math.sqrt(
                    Math.pow(event.clientX - slotCenterX, 2) + 
                    Math.pow(event.clientY - slotCenterY, 2)
                );

                // 거리가 가깝고 + 해당 슬롯의 정답 번호와 조각 번호가 일치할 때만!
                if (dist < minDistance && slot.dataset.correctIndex == activePiece.dataset.index) {
                    targetSlot = slot;
                }
            });

            if (targetSlot) {
                // 1. 정답 위치 근처에 놓았을 때 -> 착 달라붙기
                activePiece.style.transform = '';
                targetSlot.appendChild(activePiece);
                activePiece.classList.add('is-correct');
                checkWin();
            } else {
                // 2. 잘못된 위치거나 정답이 아닐 때 -> 원래 있던 자리로 복귀
                activePiece.classList.add('returning');
                activePiece.style.transform = 'translate(0, 0)';
                setTimeout(() => {
                    activePiece.classList.remove('returning');
                    // 실제로 부모 노드를 유지하여 시각적으로만 제자리로 보이게 하거나, 
                    // 필요하다면 다시 lastParent에 appendChild 해줍니다.
                }, 400);
            }

            window.removeEventListener('mousemove', moveDrag);
            window.removeEventListener('touchmove', moveDrag);
            window.removeEventListener('mouseup', endDrag);
            window.removeEventListener('touchend', endDrag);
            activePiece = null;
        }

        function checkWin() {
            const slots = board.querySelectorAll('.slot');
            let match = 0;
            slots.forEach(s => {
                if(s.children[0]?.dataset.index == s.dataset.correctIndex) match++;
            });
            if(match == currentSize * currentSize) celebrate();
        }

        function celebrate() {
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.classList.add('confetti');
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
                document.body.appendChild(c);
                c.animate([{transform:'translateY(0)',opacity:1},{transform:`translateY(100vh) rotate(360deg)`,opacity:0}], {duration: 2000, easing:'ease-out'}).onfinish=()=>c.remove();
            }
            setTimeout(() => alert("우와! 정답 자리에 쏙쏙 다 넣었네요! 대단해요! 🥳"), 300);
        }
    </script>
</body>
</html>
