<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>말랑말랑 터치 퍼즐 놀이</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #FFF9E1; padding: 10px; margin: 0;
            touch-action: none; /* 전체 화면 스크롤 및 확대 방지 */
            overflow: hidden;
        }

        .controls { 
            margin-top: 10px; padding: 15px; background: #fff; 
            border-radius: 25px; box-shadow: 0 6px 0 #FFD966; 
            text-align: center; border: 3px solid #FFD966; width: 90%; max-width: 450px;
        }
        
        h2 { color: #FF6B6B; font-size: 20px; margin: 5px 0; }

        .btn-group { margin: 10px 0; display: flex; gap: 8px; justify-content: center; }
        
        .level-btn { 
            padding: 8px 15px; font-size: 14px; cursor: pointer; 
            border: 2px solid #A8E6CF; background: #fff; color: #4DB6AC; 
            border-radius: 50px; font-weight: bold;
        }
        .level-btn.active { background: #A8E6CF; color: #fff; }
        
        #startBtn { 
            padding: 10px 25px; font-size: 18px; background-color: #FF8B8B; 
            color: white; border: none; border-radius: 50px; cursor: pointer; 
            font-weight: bold; box-shadow: 0 4px 0 #E57373;
        }

        .container { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-top: 15px; }
        
        .puzzle-board, .piece-bin {
            display: grid; border: 6px solid #FFD1D1; 
            background-color: #ffffff; border-radius: 15px;
        }

        .slot {
            border: 1px dashed #FFECF2; box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
        }

        .piece {
            cursor: grab; border: 1px solid rgba(255,255,255,0.8);
            box-sizing: border-box; user-select: none;
            background-repeat: no-repeat; border-radius: 8px;
            touch-action: none; /* 조각 드래그 시 브라우저 간섭 차단 */
            position: relative;
        }

        /* 드래그 중인 조각은 가장 위로 올라오게 설정 */
        .piece.dragging { 
            opacity: 0.9; 
            transform: scale(1.1); 
            z-index: 9999 !important; 
            pointer-events: none; /* 드래그 중 아래에 있는 요소를 감지하기 위해 필요 */
        }

        #preview { max-width: 80px; max-height: 80px; border: 3px solid #DCEDC8; display: none; margin: 5px auto; border-radius: 10px; }
        .label-text { font-weight: bold; color: #FF8B8B; background: #fff; padding: 3px 12px; border-radius: 20px; border: 2px solid #FFD1D1; font-size: 14px; }

        .confetti { position: fixed; width: 10px; height: 10px; z-index: 999; pointer-events: none; border-radius: 50%; }
    </style>
</head>
<body>

    <h2>🌈 터치터치 퍼즐 놀이 🌈</h2>
    
    <div class="controls">
        <label for="imageInput" style="display: inline-block; padding: 8px 20px; background: #FFD966; color: #5A4A42; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 14px;">📷 사진 고르기</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">

        <div class="btn-group">
            <button class="level-btn" onclick="setLevel(2, this)">🐣 2x2</button>
            <button class="level-btn active" onclick="setLevel(3, this)">🐥 3x3</button>
            <button class="level-btn" onclick="setLevel(4, this)">🌳 4x4</button>
        </div>

        <button id="startBtn">시작! 🧩</button>
        <img id="preview" alt="미리보기">
    </div>

    <div class="container">
        <span class="label-text">🏠 집으로 보내주세요</span>
        <div id="board" class="puzzle-board"></div>
        
        <span class="label-text">🎁 섞여있는 조각들</span>
        <div id="bin" class="piece-bin"></div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const startBtn = document.getElementById('startBtn');
        const preview = document.getElementById('preview');
        const board = document.getElementById('board');
        const bin = document.getElementById('bin');
        
        let selectedImageUrl = "";
        let currentSize = 3; 
        let imgW = 0, imgH = 0;
        
        // 드래그 관련 전역 변수
        let activePiece = null;
        let startX = 0;
        let startY = 0;

        function setLevel(size, btn) {
            currentSize = size;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            board.innerHTML = ''; bin.innerHTML = '';
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImageUrl = event.target.result;
                preview.src = selectedImageUrl;
                preview.style.display = 'block';
                const tempImg = new Image();
                tempImg.onload = function() { imgW = tempImg.width; imgH = tempImg.height; };
                tempImg.src = selectedImageUrl;
            };
            reader.readAsDataURL(file);
        });

        startBtn.addEventListener('click', function() {
            if (!selectedImageUrl) { alert("사진을 선택해 주세요! 😊"); return; }
            createPuzzle(selectedImageUrl, currentSize);
        });

        function createPuzzle(imgUrl, size) {
            board.innerHTML = ''; bin.innerHTML = '';
            const maxBase = Math.min(window.innerWidth - 30, 380);
            let displayW, displayH;
            if (imgW >= imgH) { displayW = maxBase; displayH = (imgH / imgW) * maxBase; }
            else { displayH = maxBase; displayW = (imgW / imgH) * maxBase; }

            const cellW = displayW / size;
            const cellH = displayH / size;
            
            [board, bin].forEach(el => {
                el.style.width = displayW + 'px'; el.style.height = displayH + 'px';
                el.style.gridTemplateColumns = `repeat(${size}, ${cellW}px)`;
                el.style.gridTemplateRows = `repeat(${size}, ${cellH}px)`;
            });

            let pieces = [];
            for (let i = 0; i < size * size; i++) {
                const bSlot = document.createElement('div');
                bSlot.classList.add('slot');
                bSlot.dataset.correctIndex = i;
                board.appendChild(bSlot);

                const pSlot = document.createElement('div');
                pSlot.classList.add('slot');
                bin.appendChild(pSlot);

                const piece = document.createElement('div');
                piece.classList.add('piece');
                piece.dataset.index = i;
                piece.style.width = cellW + 'px';
                piece.style.height = cellH + 'px';
                piece.style.backgroundImage = `url(${imgUrl})`;
                piece.style.backgroundSize = `${displayW}px ${displayH}px`;
                piece.style.backgroundPosition = `-${(i % size) * cellW}px -${Math.floor(i / size) * cellH}px`;
                
                // 터치 및 마우스 이벤트 등록
                piece.addEventListener('mousedown', startDrag);
                piece.addEventListener('touchstart', startDrag, {passive: false});

                pieces.push(piece);
            }

            pieces.sort(() => Math.random() - 0.5);
            const binSlots = bin.querySelectorAll('.slot');
            pieces.forEach((p, idx) => binSlots[idx].appendChild(p));
        }

        // 드래그 시작
        function startDrag(e) {
            if (activePiece) return; // 이미 드래그 중이면 무시
            
            activePiece = this;
            activePiece.classList.add('dragging');
            
            const event = e.type.includes('touch') ? e.touches[0] : e;
            startX = event.clientX;
            startY = event.clientY;

            // 이벤트 윈도우 등록 (움직임과 끝은 윈도우 전체에서 감지해야 부드러움)
            window.addEventListener('mousemove', moveDrag);
            window.addEventListener('touchmove', moveDrag, {passive: false});
            window.addEventListener('mouseup', endDrag);
            window.addEventListener('touchend', endDrag);
        }

        // 드래그 중
        function moveDrag(e) {
            if (!activePiece) return;
            e.preventDefault(); // 화면 스크롤 방지

            const event = e.type.includes('touch') ? e.touches[0] : e;
            const dx = event.clientX - startX;
            const dy = event.clientY - startY;

            activePiece.style.transform = `translate(${dx}px, ${dy}px) scale(1.1)`;
        }

        // 드래그 끝
        function endDrag(e) {
            if (!activePiece) return;

            const event = e.type.includes('touch') ? e.changedTouches[0] : e;
            
            // 드래그 종료 시 위치 초기화 및 클래스 제거
            activePiece.classList.remove('dragging');
            activePiece.style.transform = '';

            // 놓은 위치의 요소 찾기
            const dropTarget = document.elementFromPoint(event.clientX, event.clientY);
            const slot = dropTarget ? dropTarget.closest('.slot') : null;

            // 슬롯이 있고 비어있을 때만 이동
            if (slot && slot.children.length === 0) {
                slot.appendChild(activePiece);
                checkWin();
            }

            // 전역 이벤트 제거 및 상태 초기화
            window.removeEventListener('mousemove', moveDrag);
            window.removeEventListener('touchmove', moveDrag);
            window.removeEventListener('mouseup', endDrag);
            window.removeEventListener('touchend', endDrag);
            activePiece = null;
        }

        function checkWin() {
            const slots = board.querySelectorAll('.slot');
            let match = 0;
            slots.forEach(s => {
                if(s.children[0]?.dataset.index == s.dataset.correctIndex) match++;
            });
            if(match == currentSize * currentSize) celebrate();
        }

        function celebrate() {
            for (let i = 0; i < 80; i++) {
                const c = document.createElement('div');
                c.classList.add('confetti');
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
                document.body.appendChild(c);
                c.animate([{transform:'translateY(0)',opacity:1},{transform:`translateY(100vh) rotate(360deg)`,opacity:0}], {duration: 2000, easing:'ease-out'}).onfinish=()=>c.remove();
            }
            setTimeout(() => alert("우와! 정말 잘했어요! 퍼즐 완성! 🥳"), 300);
        }
    </script>
</body>
</html>
