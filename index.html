<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리반 감정 팡팡! - 둥둥 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --vh: 1vh; }
        body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; user-select: none; touch-action: none; width: 100vw; height: calc(var(--vh, 1vh) * 100); }
        #setup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .speed-container { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .speed-btn { padding: 10px 18px; font-size: 15px; border: 2px solid #eee; background: #f9f9f9; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .speed-btn.active { background: #ff4785; color: white; border-color: #ff4785; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; width: 100%; max-width: 320px; }
        .emoji-btn { font-size: 32px; border-radius: 12px; border: 3px solid #f0f0f0; background: white; aspect-ratio: 1/1; cursor: pointer; }
        #top-ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 15px; width: 90%; justify-content: center; display: none; }
        .info-box { background: rgba(255, 255, 255, 0.9); padding: 8px 20px; border-radius: 20px; border: 2px solid #ff4785; font-weight: bold; font-size: 18px; }
        #bottom-ui { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: none; }
        #target-guide { background: #fff; padding: 10px 25px; border-radius: 40px; border: 4px solid #ff4785; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        #result-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #input_video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: rotateY(180deg); }
        #gameCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2 style="margin-bottom:10px;">감정 팡팡! (둥둥 모드)</h2>
    <p style="font-size: 13px; color: #888;">기분이 조금씩 움직여요! 집중해서 잡아보세요.</p>
    <div class="speed-container">
        <button class="speed-btn active" onclick="setSpeed(10)">10</button>
        <button class="speed-btn" onclick="setSpeed(20)">20</button>
        <button class="speed-btn" onclick="setSpeed(30)">30</button>
        <button class="speed-btn" onclick="setSpeed(40)">40</button>
        <button class="speed-btn" onclick="setSpeed(50)">50</button>
    </div>
    <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="top-ui">
    <div class="info-box" style="color: #ff4785;">시간: <span id="timer">40</span></div>
    <div class="info-box" style="color: #333;">점수: <span id="score">0</span></div>
</div>

<div id="bottom-ui">
    <div id="target-guide"><span id="target-emoji" style="font-size: 35px;"></span><span>를 찾으세요!</span></div>
</div>

<div id="result-screen">
    <h1 style="font-size: 40px; color: #ff4785;">시간 종료!</h1>
    <p style="font-size: 24px; font-weight: bold; margin: 20px 0;">최종 점수: <span id="final-score">0</span>점</p>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 18px; border-radius: 15px; border: none; background: #ff4785; color: white; font-weight: bold;">다시 하기</button>
</div>

<video id="input_video" playsinline style="display:none;"></video>
<canvas id="gameCanvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const setupScreen = document.getElementById('setup-screen');
    const resultScreen = document.getElementById('result-screen');
    const topUI = document.getElementById('top-ui');
    const bottomUI = document.getElementById('bottom-ui');
    const targetEmojiDisplay = document.getElementById('target-emoji');

    let score = 0, timeLeft = 40, emojis = [], particles = [], pinchPoints = [], gameStarted = false, targetEmoji = '', gameSpeed = 10;
    const emotionList = ['😊', '😆', '🥳', '😢', '😡', '😲', '😒', '😱'];

    window.setSpeed = (val) => {
        gameSpeed = val;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.innerText == val));
    };

    emotionList.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn'; btn.innerText = emoji;
        btn.onclick = () => {
            targetEmoji = emoji; targetEmojiDisplay.innerText = emoji;
            setupScreen.style.display = 'none'; topUI.style.display = 'flex'; bottomUI.style.display = 'flex';
            startGame();
        };
        document.getElementById('emoji-grid').appendChild(btn);
    });

    function startGame() {
        gameStarted = true;
        for(let i=0; i<4; i++) emojis.push(new RandomEmotion());
        const countdown = setInterval(() => {
            timeLeft--; timerElement.innerText = timeLeft;
            if (timeLeft <= 0) { clearInterval(countdown); endGame(); }
        }, 1000);
    }

    function endGame() {
        gameStarted = false;
        document.getElementById('final-score').innerText = score;
        resultScreen.style.display = 'flex'; topUI.style.display = 'none'; bottomUI.style.display = 'none';
    }

    class RandomEmotion {
        constructor() { 
            this.size = Math.min(window.innerWidth * 0.10, 45); 
            this.init(); 
        }
        init() {
            const margin = this.size + 50;
            this.baseX = Math.random() * (canvasElement.width - margin * 2) + margin;
            this.baseY = Math.random() * (canvasElement.height - margin * 4) + margin + 60;
            this.x = this.baseX;
            this.y = this.baseY;
            
            // 움직임을 위한 오프셋 및 속도
            this.offsetX = 0; this.offsetY = 0;
            this.angle = Math.random() * Math.PI * 2;
            this.floatSpeed = Math.random() * 0.05 + 0.02;

            const pool = [...emotionList, targetEmoji, targetEmoji]; 
            this.text = pool[Math.floor(Math.random() * pool.length)];
            this.isPopping = false; this.popLife = 1.0; this.timer = 0;
            this.maxTime = (60 / (gameSpeed / 10)) * 2.2; 
        }
        update() {
            if (!gameStarted) return;
            if (this.isPopping) {
                this.popLife -= 0.08;
                if (this.popLife <= 0) this.init();
                return;
            }
            this.timer++;
            if (this.timer > this.maxTime) this.init();

            // 부드러운 둥둥 움직임 계산
            this.angle += this.floatSpeed;
            this.offsetX = Math.sin(this.angle) * 15; // 좌우 15px 범위
            this.offsetY = Math.cos(this.angle * 0.8) * 15; // 상하 15px 범위
            this.x = this.baseX + this.offsetX;
            this.y = this.baseY + this.offsetY;

            for (let p of pinchPoints) {
                if (Math.hypot(this.x - p.x, this.y - p.y) < this.size * 1.3) {
                    this.isPopping = true;
                    const isCorrect = this.text === targetEmoji;
                    if (isCorrect) { score += 10; scoreElement.innerText = score; }
                    for(let i=0; i<6; i++) particles.push({x:this.x, y:this.y, sx:Math.random()*6-3, sy:Math.random()*6-3, life:1, c:isCorrect});
                    break;
                }
            }
        }
        draw() {
            canvasCtx.save();
            canvasCtx.globalAlpha = this.popLife;
            let drawX = canvasElement.width - this.x;
            canvasCtx.translate(drawX, this.y);
            canvasCtx.font = `${this.size}px "Apple Color Emoji", serif`;
            canvasCtx.textAlign = 'center'; canvasCtx.textBaseline = 'middle'; 
            canvasCtx.fillText(this.text, 0, 0);
            canvasCtx.restore();
        }
    }

    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        pinchPoints = [];
        if (results.multiHandLandmarks) {
            results.multiHandLandmarks.forEach((landmarks) => {
                canvasCtx.strokeStyle = '#39FF14'; canvasCtx.lineWidth = 4;
                const fingerJoints = [[0,1,2,3,4], [0,5,6,7,8], [5,9,10,11,12], [9,13,14,15,16], [13,17,18,19,20], [0,17]];
                fingerJoints.forEach(joint => {
                    canvasCtx.beginPath();
                    joint.forEach((idx, i) => {
                        const x = (1 - landmarks[idx].x) * canvasElement.width;
                        const y = landmarks[idx].y * canvasElement.height;
                        if(i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
                    });
                    canvasCtx.stroke();
                });
                const thumb = landmarks[4], index = landmarks[8];
                if (Math.hypot(thumb.x - index.x, thumb.y - index.y) < 0.06) {
                    const px = ((thumb.x + index.x) / 2) * canvasElement.width;
                    const py = ((thumb.y + index.y) / 2) * canvasElement.height;
                    pinchPoints.push({x: px, y: py});
                    canvasCtx.fillStyle = '#FFFF00'; canvasCtx.beginPath();
                    canvasCtx.arc((1-thumb.x)*canvasElement.width, thumb.y*canvasElement.height, 10, 0, Math.PI*2); canvasCtx.fill();
                }
            });
        }
        if (gameStarted || timeLeft <= 0) {
            emojis.forEach(e => { e.update(); e.draw(); });
            particles.forEach(p => {
                p.x += p.sx; p.y += p.sy; p.life -= 0.06;
                canvasCtx.fillStyle = p.c ? `rgba(255,255,0,${p.life})` : `rgba(255,255,255,${p.life})`;
                canvasCtx.beginPath(); canvasCtx.arc(canvasElement.width - p.x, p.y, 2, 0, Math.PI*2); canvasCtx.fill();
            });
            particles = particles.filter(p => p.life > 0);
        }
    });

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start().then(() => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    });
</script>
</body>
</html>
