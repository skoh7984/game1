<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감정 선택 팡팡</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f8f9fa; font-family: 'Arial', sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #target-area { font-size: 20px; color: #333; margin-bottom: 5px; }
        #target-emoji { font-size: 40px; display: block; text-align: center; margin: 10px 0; }
        #score-area { font-size: 24px; font-weight: bold; color: #d81b60; border-top: 1px solid #ddd; pt: 5px; }
        #input_video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: rotateY(180deg); opacity: 0.4; }
        #gameCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; transform: rotateY(180deg); z-index: 5; }
    </style>
</head>
<body>

<div id="ui">
    <div id="target-area">👇 이 기분을 찾아보세요!</div>
    <div id="target-emoji">😊</div>
    <div id="score-area">점수: <span id="score">0</span></div>
</div>

<video id="input_video" playsinline style="display:none;"></video>
<canvas id="gameCanvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');
    const targetEmojiElement = document.getElementById('target-emoji');

    let score = 0;
    let emojis = [];
    let particles = [];
    let handPoints = []; // 모든 손가락 마디 좌표 저장
    let useCamera = false;
    let targetEmoji = '';
    const emotionList = ['😢', '😡', '😊', '😲', '😆', '😒', '😱', '🥳'];

    function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // 목표 이모티콘 랜덤 설정
    function setRandomTarget() {
        targetEmoji = emotionList[Math.floor(Math.random() * emotionList.length)];
        targetEmojiElement.innerText = targetEmoji;
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.size = Math.random() * 8 + 2;
            this.speedX = Math.random() * 10 - 5;
            this.speedY = Math.random() * 10 - 5;
            this.life = 1.0;
            this.color = color || '#ff69b4';
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.03; }
        draw() {
            canvasCtx.fillStyle = this.color.replace(')', `, ${this.life})`).replace('rgb', 'rgba');
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    class Emotion {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvasElement.width;
            this.y = -50;
            this.text = emotionList[Math.floor(Math.random() * emotionList.length)];
            this.size = Math.random() * 20 + 50;
            this.speed = Math.random() * 2 + 1.2;
        }
        update() {
            this.y += this.speed;
            if (this.y > canvasElement.height + 50) this.init();
            
            // 모든 손가락 마디(handPoints)와 충돌 체크
            let hit = false;
            if (useCamera) {
                for (let point of handPoints) {
                    const dist = Math.hypot(this.x - point.x, this.y - point.y);
                    if (dist < this.size * 0.6) { hit = true; break; }
                }
            } else {
                // 마우스 모드 (반전 좌표 계산)
                const dist = Math.hypot(this.x - (canvasElement.width - mouseX), this.y - mouseY);
                if (dist < this.size * 0.6) hit = true;
            }

            if (hit) this.pop();
        }
        pop() {
            // 정답을 맞췄을 때만 점수 획득 및 목표 변경
            if (this.text === targetEmoji) {
                score += 10;
                scoreElement.innerText = score;
                for(let i=0; i<12; i++) particles.push(new Particle(this.x, this.y, 'rgb(255, 215, 0)')); // 금색 파티클
                setRandomTarget(); // 목표 변경
            } else {
                // 틀린걸 잡았을 때 효과
                for(let i=0; i<5; i++) particles.push(new Particle(this.x, this.y, 'rgb(200, 200, 200)'));
            }
            this.init();
        }
        draw() {
            canvasCtx.font = `${this.size}px serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText(this.text, this.x, this.y);
        }
    }

    for (let i = 0; i < 10; i++) emojis.push(new Emotion());
    setRandomTarget();

    let mouseX = -1000, mouseY = -1000;
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        handPoints = [];
        
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // 모든 마디(21개)를 충돌 판정에 사용
                landmarks.forEach(point => {
                    const px = point.x * canvasElement.width;
                    const py = point.y * canvasElement.height;
                    handPoints.push({x: px, y: py});
                });
                // 손가락 끝부분에 살짝 표시
                [4, 8, 12, 16, 20].forEach(idx => {
                    canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    canvasCtx.beginPath();
                    canvasCtx.arc(landmarks[idx].x * canvasElement.width, landmarks[idx].y * canvasElement.height, 15, 0, Math.PI * 2);
                    canvasCtx.fill();
                });
            }
        }
        updateGame();
    });

    function updateGame() {
        if (!useCamera) canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        emojis.forEach(e => { e.update(); e.draw(); });
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        if (!useCamera) requestAnimationFrame(updateGame);
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });

    camera.start().then(() => {
        useCamera = true;
        videoElement.style.display = 'block';
    }).catch(() => {
        useCamera = false;
        updateGame();
    });
</script>
</body>
</html>
