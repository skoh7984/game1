<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>손바닥 팡팡: 감정 선택 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f4f8; font-family: 'Malgun Gothic', sans-serif; user-select: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; }
        #score-area { font-size: 24px; font-weight: bold; color: #2d3436; }
        #target-display { font-size: 18px; color: #636e72; margin-top: 5px; }
        
        /* 시작 화면 (이모티콘 선택) */
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255,255,255,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #start-screen h1 { color: #2d3436; margin-bottom: 30px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 20px; }
        .emoji-btn { font-size: 50px; cursor: pointer; border: none; background: white; border-radius: 20px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 10px; }
        .emoji-btn:hover { transform: scale(1.2); background: #e1f5fe; }

        #input_video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; transform: rotateY(180deg); opacity: 0.3; }
        #gameCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; transform: rotateY(180deg); z-index: 5; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>오늘 터뜨릴 감정을 골라보세요!</h1>
    <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="ui">
    <div id="score-area">점수: <span id="score">0</span></div>
    <div id="target-display">목표: <span id="target-text"></span></div>
</div>

<video id="input_video" playsinline style="display:none;"></video>
<canvas id="gameCanvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('gameCanvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startScreen = document.getElementById('start-screen');
    const emojiGrid = document.getElementById('emoji-grid');
    const targetText = document.getElementById('target-text');
    const ui = document.getElementById('ui');

    let score = 0;
    let emojis = [];
    let particles = [];
    let handPoints = []; 
    let useCamera = false;
    let gameStarted = false;
    let targetEmoji = '';
    const emotionList = ['😊', '😆', '🥳', '😢', '😡', '😲', '😒', '😱'];

    // 1. 시작 화면 구성
    emotionList.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.innerText = emoji;
        btn.onclick = () => startGame(emoji);
        emojiGrid.appendChild(btn);
    });

    function startGame(selectedEmoji) {
        targetEmoji = selectedEmoji;
        targetText.innerText = targetEmoji;
        startScreen.style.display = 'none';
        ui.style.display = 'block';
        gameStarted = true;
        initEmojis();
    }

    function resize() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y, isTarget) {
            this.x = x; this.y = y;
            this.size = Math.random() * 8 + 2;
            this.speedX = Math.random() * 10 - 5;
            this.speedY = Math.random() * 10 - 5;
            this.life = 1.0;
            this.color = isTarget ? '255, 215, 0' : '180, 180, 180';
        }
        update() { this.x += this.speedX; this.y += this.speedY; this.life -= 0.03; }
        draw() {
            canvasCtx.fillStyle = `rgba(${this.color}, ${this.life})`;
            canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            canvasCtx.fill();
        }
    }

    class Emotion {
        constructor() { this.init(); }
        init() {
            this.x = Math.random() * canvasElement.width;
            this.y = -50;
            this.text = emotionList[Math.floor(Math.random() * emotionList.length)];
            this.size = Math.random() * 20 + 60; // 아이들을 위해 크기를 조금 더 키움
            this.speed = Math.random() * 2 + 1;
        }
        update() {
            if (!gameStarted) return;
            this.y += this.speed;
            if (this.y > canvasElement.height + 50) this.init();
            
            let hit = false;
            for (let point of handPoints) {
                const dist = Math.hypot(this.x - point.x, this.y - point.y);
                if (dist < this.size * 0.7) { hit = true; break; }
            }

            if (hit) {
                if (this.text === targetEmoji) {
                    score += 10;
                    scoreElement.innerText = score;
                    for(let i=0; i<15; i++) particles.push(new Particle(this.x, this.y, true));
                } else {
                    for(let i=0; i<5; i++) particles.push(new Particle(this.x, this.y, false));
                }
                this.init();
            }
        }
        draw() {
            canvasCtx.font = `${this.size}px serif`;
            canvasCtx.textAlign = 'center';
            canvasCtx.fillText(this.text, this.x, this.y);
        }
    }

    function initEmojis() {
        emojis = [];
        for (let i = 0; i < 12; i++) emojis.push(new Emotion());
    }

    // 2. 손바닥 중심 및 모든 마디 인식 로직
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5 });
    hands.onResults((results) => {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        handPoints = [];
        
        if (results.multiHandLandmarks) {
            for (const landmarks of results.multiHandLandmarks) {
                // 손바닥 중심점 계산 (손목, 검지 시작점, 소지 시작점의 평균)
                const palmCenterX = (landmarks[0].x + landmarks[5].x + landmarks[17].x) / 3 * canvasElement.width;
                const palmCenterY = (landmarks[0].y + landmarks[5].y + landmarks[17].y) / 3 * canvasElement.height;
                handPoints.push({x: palmCenterX, y: palmCenterY});

                // 모든 마디 추가
                landmarks.forEach(point => {
                    handPoints.push({x: point.x * canvasElement.width, y: point.y * canvasElement.height});
                });

                // 시각적 피드백 (손바닥 중심에 큰 원)
                canvasCtx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                canvasCtx.beginPath();
                canvasCtx.arc(palmCenterX, palmCenterY, 50, 0, Math.PI * 2);
                canvasCtx.fill();
            }
        }
        updateGame();
    });

    function updateGame() {
        if (gameStarted) {
            emojis.forEach(e => { e.update(); e.draw(); });
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
        }
    }

    const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 1280, height: 720
    });
    camera.start();
</script>
</body>
</html>
